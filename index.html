<!DOCTYPE html>

<html lang=en>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <script src="main.js" defer></script>
  <style>
    body {
      margin: 0px;
      font-family: Arial;
    }
    #viewport {
      display: block;
      touch-action: none;
    }
    #buttons {
      position: absolute;
      top: 30px;
      left: 30px;
      gap: 30px;
    }
    #buttons > button {
      color: white;
      background-color: #262735;
      border: none;
      padding: 5px;
      margin: 6px 0px;
    }
    #buttons > a {
      display: block;
      color:white;
      padding: 5px;
      margin: 6px 0px;
    }
  </style>
</head>

<body>
  <div id="container">
    <canvas id="viewport"></canvas>
    <div id="buttons">
      <button id="refresh-btn">refresh</button> <br>
      <button id="vel-btn">velocity lines</button> <br>
      <button id="spawn-btn">spawn planet</button> <br>
      <a href="https://github.com/mortargoblin/gravitysim_web">github</a>
    </div>
  </div>
</body>
</html>
