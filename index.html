<!DOCTYPE html>

<html lang=en>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <script src="main.js" defer></script>
  <style>
    body {
      text-align: center;
      margin: 0px;
    }
    #viewport {
      display: block;
      touch-action: none;
    }
    #buttons {
      position: absolute;
      top: 30px;
      left: 30px;
      gap: 30px;
    }
    #buttons > button {
    }
    #spawn-btn {
      display: none;
    }
  </style>
</head>

<body>
  <div id="container">
    <canvas id="viewport"></canvas>
    <div id="buttons">
      <button id="vel-btn">velocity lines</button> <br>
      <button id="spawn-btn">spawn planet</button>
    </div>
  </div>
</body>
</html>
